name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, "3.10", "3.11", "3.12"]
        pandas: [
          # pandas==2.0.0,
          # pandas==2.1.0,
          pandas==2.2.0,
          pandas
        ]
        # exclude:
        #   - python-version: 3.9
        #     pandas: pandas==2.0.0
        #   - python-version: 3.9
        #     pandas: pandas==2.1.0
        #   - python-version: "3.10"
        #     pandas: pandas==2.0.0
        #   - python-version: "3.10"
        #     pandas: pandas==2.1.0

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --extra all
          uv pip install -U "$PANDAS"
        env:
          PANDAS: ${{ matrix.pandas }}
      - name: Run flake8
        run: uv run flake8 datar_pandas
      - name: Show versions
        run: uv run python -c 'import datar; datar.get_versions()'
      - name: Test with pytest
        run: uv run pytest tests/ --junitxml=junit/test-results-${{ matrix.python-version }}.xml
      - name: Upload pytest test results
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-${{ matrix.python-version }}-${{ matrix.pandas }}
          path: junit/test-results-${{ matrix.python-version }}-${{ matrix.pandas }}.xml
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}
      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@master
        if: matrix.python-version == 3.10 && matrix.pandas == 'pandas' && github.event_name != 'pull_request'
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: cov.xml

